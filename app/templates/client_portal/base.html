<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Community Services{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="/static/images/favicon.ico">

    <!-- PNG favicon -->
    <link rel="icon" type="image/png" sizes="96x96" href="/static/images/favicon-96x96.png">

    <!-- Apple -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/apple-touch-icon.png">

    <!-- Manifest -->
    <link rel="manifest" href="/static/images/site.webmanifest">

    <style>
        body {
            background: #ffffff;
            font-family: Arial, sans-serif;
            color: #1a1a1a;
        }

        .portal-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
            background: #f8f9fa;
        }

        .portal-card {
            width: 100%;
            max-width: 760px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #eee;
        }

        .portal-header {
            background: #000000; /* BLACK */
            color: #d4af37;       /* GOLD */
            padding: 20px 24px;
            border-bottom: 3px solid #d4af37;
        }

        .portal-header h4 {
            margin: 0;
            font-weight: 600;
        }

        .portal-body {
            padding: 26px;
        }

        .brand-small {
            font-size: 0.9rem;
            color: #e6c65c;
        }

        .footer-note {
            font-size: 0.9rem;
            color: #777;
        }

        /* PRIMARY BUTTON (GOLD) */
        .btn-primary {
            background-color: #d4af37;
            border-color: #d4af37;
            color: #000;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: #c29b2e;
            border-color: #c29b2e;
            color: #000;
        }

        .btn-primary:disabled {
            background-color: #ccc;
            border-color: #ccc;
            color: #666;
            cursor: not-allowed;
        }

        /* SECONDARY BUTTON */
        .btn-outline-dark {
            border-color: #000;
            color: #000;
        }

        .btn-outline-dark:hover {
            background-color: #000;
            color: #fff;
        }

        /* LIGHT BUTTON (for header actions) */
        .btn-light {
            background: #fff;
            color: #000;
            border: none;
            font-weight: 500;
        }

        .btn-light:hover {
            background: #f1f1f1;
        }

        /* INPUT FOCUS */
        .form-control:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 0.2rem rgba(212, 175, 55, 0.2);
        }
    </style>

    {% block head %}{% endblock %}
</head>
<body>
    <div class="portal-wrapper">
        <div class="portal-card">
            {% block body %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
